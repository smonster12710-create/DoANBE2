services:
  # PHP Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: doanbe2-php
    container_name: doanbe2-app
    restart: unless-stopped
    tty: true
    volumes:
      - ./:/var/www
    networks:
      - app-network

  # Nginx Service (Web Server)
  webserver:
    image: nginx:stable-alpine
    container_name: doanbe2-webserver
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker_config/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - app-network

  # MySQL Service (Database)
  db:
    image: mysql:8.0
    container_name: doanbe2-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: techstore_db
      MYSQL_ROOT_PASSWORD: root
      MYSQL_PASSWORD: root
      MYSQL_USER: user
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app-network

  # phpMyAdmin (Quản lý DB)
  phpmyadmin:
    image: phpmyadmin
    container_name: doanbe2-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - ARBITRARY_SERVER_CONNECTION=1
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local